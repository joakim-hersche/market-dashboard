<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/streamlit-component-lib@2.0.0/dist/streamlit-component-lib.js"></script>
</head>
<body>
<script>
  Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function (event) {
    var args = event.detail.args;
    var key = args.storage_key;

    if (args.operation === "get") {
      var val = "";
      try { val = localStorage.getItem(key) || ""; } catch (e) {}
      Streamlit.setComponentValue(val);

    } else if (args.operation === "set") {
      try { localStorage.setItem(key, args.value); } catch (e) {}
      Streamlit.setComponentValue(1);
    }

    Streamlit.setFrameHeight(0);
  });

  Streamlit.setComponentReady();
</script>
</body>
</html>
