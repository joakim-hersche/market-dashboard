<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
  function sendMsg(type, data) {
    window.parent.postMessage(
      Object.assign({ isStreamlitMessage: true, type: type }, data),
      "*"
    );
  }
  function setComponentReady() {
    sendMsg("streamlit:componentReady", { apiVersion: 1 });
  }
  function setComponentValue(value) {
    sendMsg("streamlit:setComponentValue", { value: value, dataType: "json" });
  }
  function setFrameHeight(height) {
    sendMsg("streamlit:setFrameHeight", { height: height || 0 });
  }
  window.addEventListener("message", function(event) {
    if (event.data.type === "streamlit:render") {
      var args = event.data.args;
      var key = args.storage_key;
      if (args.operation === "get") {
        var val = "";
        try { val = localStorage.getItem(key) || ""; } catch(e) {}
        setComponentValue(val);
      } else if (args.operation === "set") {
        try { localStorage.setItem(key, args.value); } catch(e) {}
        setComponentValue(1);
      }
      setFrameHeight(0);
    }
  });
  setComponentReady();
</script>
</body>
</html>
